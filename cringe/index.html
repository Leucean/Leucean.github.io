<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>The Site of Immense Cringe</title>
        <link rel="icon" href="/media/ui/favicon/favicon.ico" type="image/x-icon" />
        <link rel="stylesheet" href="/leuceanstyles.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://www.w3schools.com/lib/w3.js"></script>
    </head>
    <body>
        <div class="container-fluid w3-mobile" id="header" style="width: 50%; margin: auto; padding-top: 1%">
            <div class="col-sm" id="headerpic">
                <a href="/"
                    ><img
                        type="button"
                        class="img-thumbnail rounded-circle w3-hover-sepia w3-hoverable"
                        src="/media/gallery/art/leu-mylafox-icon.webp"
                        style="max-width: 20%; height: auto; display: block; margin: 0 auto"
                        alt="Leucean Autumn Theme Icon, Artwork by MylaFox, 2023"
                /></a>
                <div
                    class="container-fluid w3-dark-grey w3-border w3-border-black w3-round-xlarge w3-center"
                    style="width: 95%; margin: auto; padding: 3%"
                    id="headerdate">
                    <h1>Suffer.</h1>
                </div>
                <br />
                <div
                    class="container-fluid w3-dark-grey w3-border w3-border-black w3-round-xlarge w3-center"
                    style="width: 95%; margin: auto; padding: 3%">
                    <div class="row row-cols-1 row-cols-md-3 g-4">
                        <div class="col">
                            <div class="card mx-auto my-2 shadow">
                                <a href="/cringe/leu-oggy-67.png" target="_blank">
                                    <img
                                        class="card-img-top w3-hover-opacity"
                                        src="/cringe/leu-oggy-67.png"
                                        alt="Oggyfox, 2026" />
                                </a>
                                <div class="card-body">
                                    <h4 class="card-title">Oggyfox, 2026</h4>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card mx-auto my-2 shadow">
                                <div id="carouselLeuMaddy" class="carousel slide" data-bs-ride="carousel">
                                    <div class="carousel-inner">
                                        <div class="carousel-item active">
                                            <a href="/cringe/leu-maddy-1.gif" target="_blank">
                                                <img
                                                    src="/cringe/leu-maddy-1.gif"
                                                    class="d-block w-100 w3-hover-opacity"
                                                    alt="Maddy, 2026" />
                                            </a>
                                        </div>
                                        <div class="carousel-item">
                                            <a href="/cringe/leu-maddy-2.gif" target="_blank">
                                                <img
                                                    src="/cringe/leu-maddy-2.gif"
                                                    class="d-block w-100 w3-hover-opacity"
                                                    alt="Maddy, 2026" />
                                            </a>
                                        </div>
                                        <div class="carousel-item">
                                            <a href="/cringe/leu-maddy-3.gif" target="_blank">
                                                <img
                                                    src="/cringe/leu-maddy-3.gif"
                                                    class="d-block w-100 w3-hover-opacity"
                                                    alt="Maddy, 2026" />
                                            </a>
                                        </div>
                                    </div>
                                    <button
                                        class="carousel-control-prev"
                                        type="button"
                                        data-bs-target="#carouselLeuMaddy"
                                        data-bs-slide="prev">
                                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                        <span class="visually-hidden">Previous</span>
                                    </button>
                                    <button
                                        class="carousel-control-next"
                                        type="button"
                                        data-bs-target="#carouselLeuMaddy"
                                        data-bs-slide="next">
                                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                        <span class="visually-hidden">Next</span>
                                    </button>
                                </div>
                                <div class="card-body">
                                    <h4 class="card-title">Maddy, 2026</h4>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card mx-auto my-2 shadow">
                                <div id="carouselLeuRoog" class="carousel slide" data-bs-ride="carousel">
                                    <div class="carousel-inner">
                                        <div class="carousel-item active">
                                            <a href="/cringe/leu-roog-schmove-1.gif" target="_blank">
                                                <img
                                                    src="/cringe/leu-roog-schmove-1.gif"
                                                    class="d-block w-100 w3-hover-opacity"
                                                    alt="Roguehusky, 2026" />
                                            </a>
                                        </div>
                                        <div class="carousel-item">
                                            <a href="/cringe/leu-roog-schmove-2.gif" target="_blank">
                                                <img
                                                    src="/cringe/leu-roog-schmove-2.gif"
                                                    class="d-block w-100 w3-hover-opacity"
                                                    alt="Roguehusky, 2026" />
                                            </a>
                                        </div>
                                    </div>
                                    <button
                                        class="carousel-control-prev"
                                        type="button"
                                        data-bs-target="#carouselLeuRoog"
                                        data-bs-slide="prev">
                                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                        <span class="visually-hidden">Previous</span>
                                    </button>
                                    <button
                                        class="carousel-control-next"
                                        type="button"
                                        data-bs-target="#carouselLeuRoog"
                                        data-bs-slide="next">
                                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                        <span class="visually-hidden">Next</span>
                                    </button>
                                </div>
                                <div class="card-body">
                                    <h4 class="card-title">Roguehusky, 2026</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="/scripts.js"></script>
    </body>
</html>
